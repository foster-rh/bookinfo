{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
  annotations:
    networking.istio.io/service-type: {{ if .Values.connectivityLink.enabled }}LoadBalancer{{ else }}{{ .Values.gateway.serviceType }}{{ end }}
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  {{- if .Values.connectivityLink.enabled }}
  labels:
    kuadrant.io/gateway: "true"
  {{- end }}
spec:
  gatewayClassName: istio
  listeners:
  {{- if .Values.connectivityLink.enabled }}
  - name: https
    hostname: {{ .Values.connectivityLink.hostname }}
    port: 443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
        - group: ""
          kind: Secret
          name: {{ .Values.connectivityLink.tls.secretName }}
  {{- end }}
  {{- range .Values.gateway.listeners }}
  - name: {{ .name }}
    port: {{ .port }}
    protocol: {{ .protocol }}
    allowedRoutes:
      namespaces:
        from: All
  {{- end }}
{{- if .Values.gateway.route.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  port:
    targetPort: http
  to:
    kind: Service
    name: {{ .Values.gateway.name }}-istio
  wildcardPolicy: None
{{- end }}
{{- end }}

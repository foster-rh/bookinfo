{{- if .Values.skupper.enabled }}
apiVersion: skupper.io/v2alpha1
kind: Site
metadata:
  name: skupper-site
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  linkAccess: {{ .Values.skupper.site.linkAccess }}
---
{{- if eq .Values.skupper.site.linkAccess "default" }}
apiVersion: skupper.io/v2alpha1
kind: AccessGrant
metadata:
  name: skupper-grant
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  redemptionsAllowed: 10
  expirationWindow: 60m
{{- end }}
{{- end }}

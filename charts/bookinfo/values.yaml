imageVersion: "1.20.3"
imagePullPolicy: IfNotPresent

ambient:
  enabled: true

productpage:
  replicas: 1
  image: docker.io/istio/examples-bookinfo-productpage-v1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

details:
  replicas: 1
  image: docker.io/istio/examples-bookinfo-details-v1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

ratings:
  replicas: 1
  image: docker.io/istio/examples-bookinfo-ratings-v1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

reviews:
  v1:
    enabled: true
    replicas: 1
    image: docker.io/istio/examples-bookinfo-reviews-v1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  v2:
    enabled: true
    replicas: 1
    image: docker.io/istio/examples-bookinfo-reviews-v2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  v3:
    enabled: true
    replicas: 1
    image: docker.io/istio/examples-bookinfo-reviews-v3
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

gateway:
  enabled: false
  name: istio-ingress
  namespace: istio-system

skupper:
  enabled: false
  site:
    linkAccess: default
  services:
    - name: productpage
      port: 9080
      selector: app=productpage
    - name: details
      port: 9080
      selector: app=details
    - name: ratings
      port: 9080
      selector: app=ratings
    - name: reviews
      port: 9080
      selector: app=reviews
